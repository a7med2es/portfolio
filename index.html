<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>portfolio</title>
    <meta name="description" content="Ahmed Essam Portfolio" />
    <meta name="author" content="Ahmed Essam" />

    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta property="og:title" content="Ahmed Essam - Portfolio" />
    <meta property="og:description" content="Ahmed Essam Portfolio" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AhmedEssam" />
    <meta name="twitter:image" content="/favicon.png" />
  </head>

  <body>
    <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,0,0,0.9); color:white; z-index:999999; padding:20px; font-family:monospace; overflow:auto;">
      <h2>Fatal Error Caught:</h2>
      <pre id="error-message"></pre>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-message').innerText = e.message + '\n' + e.filename + ':' + e.lineno + '\n\n' + (e.error ? e.error.stack : '');
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-message').innerText = 'Unhandled Promise Rejection: ' + e.reason;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
